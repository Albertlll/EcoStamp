<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoLog WebApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">EcoLog Wi-Fi Viewer</p>
        <h1>Список записей с SD-карты ESP</h1>
        <p class="lead">
          Подключитесь к сети устройства, укажите адрес ESP и загрузите сохраненные записи.
        </p>
      </section>

      <section class="panel controls">
        <div class="control-grid">
          <label>
            Адрес ESP
            <input id="deviceUrl" type="text" placeholder="http://192.168.4.1" />
          </label>
          <label>
            SSID
            <input id="ssid" type="text" value="EcoLog-Device" readonly />
          </label>
          <label>
            Пароль
            <input id="password" type="text" value="ecolog123" readonly />
          </label>
        </div>
        <div class="actions">
          <button id="connectBtn" class="btn btn-secondary">Проверить связь</button>
          <button id="refreshBtn" class="btn btn-primary">Загрузить записи</button>
        </div>
        <div id="status" class="status">Ожидание подключения</div>
      </section>

      <section class="metrics">
        <article class="metric-card">
          <span>Записей</span>
          <strong id="recordsCount">0</strong>
        </article>
        <article class="metric-card">
          <span>Последняя запись</span>
          <strong id="latestRecord">-</strong>
        </article>
      </section>

      <section class="panel">
        <div class="list-head">
          <h2>Записи</h2>
          <input id="searchInput" type="search" placeholder="Поиск по ID, времени, координатам, заметке" />
        </div>
        <div id="recordsList" class="records-list"></div>
      </section>
    </main>

    <template id="recordTemplate">
      <article class="record-card">
        <div class="record-top">
          <strong class="record-id"></strong>
          <span class="record-time"></span>
        </div>
        <div class="record-grid">
          <div><span>Координаты</span><strong class="record-coords"></strong></div>
          <div><span>Температура</span><strong class="record-temp"></strong></div>
          <div><span>GPS</span><strong class="record-fix"></strong></div>
          <div><span>captured_ms</span><strong class="record-ms"></strong></div>
        </div>
        <p class="record-note"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
